#        priority: 6

  - name: Malady Blackhand
    class: necromancer
    level: 1
    stats: { str: 13, dex: 10, con: 10, int: 13, wis: 5, cha: 15 }
    armorClass: 12
    hitPoints: 4
    weapons:
      - type: longsword
        attackRollBonus: 1
        priority: 2
    spells:
      - type: withermark
        spellCheckBonus: 1
        priority: 1
      - type: undeath
        spellCheckBonus: 1
        priority: 10

  - name: Alaric
    class: wizard
    level: 1
    stats: { str: 13, dex: 13, con: 13, int: 16, wis: 10, cha: 11 }
    armorClass: 11
    hitPoints: 5
    weapons:
      - type: staff
        priority: 1
    spells:
      - type: magic-missile
        priority: 2
      - type: burning-hands
        advantage: true
        priority: 5
      - type: sleep
        priority: 10

  - name: Brother Torvin
    class: priest
    level: 1
    stats: { str: 18, dex: 10, con: 10, int: 7, wis: 18, cha: 10 }
    armorClass: 13
    hitPoints: 8
    weapons:
      - type: longsword
        priority: 1
    spells:
      - type: holy-weapon
        priority: 5
      - type: cure-wounds
        priority: 10
      - type: turn-undead
        priority: 10

monsters:
  - type: storm-giant
    name: Storm Giant

# Baseline from lost-citadel-vs-storm-giant.yaml (prebuilt party, 1000 fights):
