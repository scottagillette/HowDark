# Mirrors the active fight in HowDark.main:
#   party    = new LostCitadelPartyBuilder().build()
#   monsters = List.of(new StormGiant("Storm Giant"))
#   1000 simulations
#
# Uses the prebuilt "lost-citadel" party, so the characters carry their exact
# hand-tuned stats, armor and loadout -- an exact reproduction of main, including
# Pebble Weatherton being excluded (the builder comments out creatures.add(pebble)).

simulations: 1000

partyBuilder: lost-citadel

monsters:
  - type: storm-giant
    name: Storm Giant


