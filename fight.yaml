# Example fight configuration for How Dark?
#
# Party members are picked by class; each class comes with a default loadout
# (stats, armor, weapons and spells). Classes: bard, commoner, fighter,
# knight-of-st-ydris, necromancer, paladin, priest, ranger, thief, warlock,
# witch, wizard.
#
# Monsters are picked by type (e.g. goblin, storm-giant, bone-naga). Use
# "count" for multiples; names are numbered automatically.

simulations: 1000

party:
  - name: Borlin Little Digger
    class: paladin
  - name: Alaric
    class: wizard
  - name: Brother Torvin
    class: priest
  - name: Tarin
    class: thief
    level: 2

monsters:
  - type: goblin
    count: 4
  - type: goblin-shaman
    name: Zek the Shaman
